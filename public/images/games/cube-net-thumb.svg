<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200">
  <!-- 背景 - 米色渐变 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f4f8"/>
      <stop offset="100%" style="stop-color:#dfe8f0"/>
    </linearGradient>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e85d4c"/>
      <stop offset="100%" style="stop-color:#d74a3a"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bgGradient)" rx="12"/>

  <!-- 左侧：展开图网格 -->
  <g transform="translate(40, 50)">
    <!-- 4x4 网格 -->
    <!-- 第一行 -->
    <rect x="0" y="0" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
    <rect x="32" y="0" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
    <rect x="64" y="0" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
    <rect x="96" y="0" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>

    <!-- 第二行 -->
    <rect x="0" y="32" width="30" height="30" fill="#2A9D8F" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <circle cx="15" cy="47" r="10" fill="#fff" opacity="0.4"/>

    <rect x="32" y="32" width="30" height="30" fill="#264653" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <rect x="40" y="40" width="14" height="14" fill="#fff" opacity="0.3" rx="2"/>

    <rect x="64" y="32" width="30" height="30" fill="#3A86FF" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <circle cx="79" cy="47" r="8" fill="#fff" opacity="0.3"/>

    <rect x="96" y="32" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>

    <!-- 第三行 -->
    <rect x="0" y="64" width="30" height="30" fill="#E76F51" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <polygon points="15,70 21,80 9,80" fill="#fff" opacity="0.5"/>

    <rect x="32" y="64" width="30" height="30" fill="#2B59C3" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <line x1="40" y1="72" x2="54" y2="86" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="54" y1="72" x2="40" y2="86" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>

    <rect x="64" y="64" width="30" height="30" fill="#6C757D" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <rect x="71" y="71" width="16" height="16" fill="#F9C74F" rx="2"/>

    <rect x="96" y="64" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>

    <!-- 第四行 -->
    <rect x="0" y="96" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
    <rect x="32" y="96" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
    <rect x="64" y="96" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
    <rect x="96" y="96" width="30" height="30" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" rx="4"/>
  </g>

  <!-- 右侧：3D 立方体 -->
  <g transform="translate(190, 60)">
    <!-- 阴影 -->
    <ellipse cx="50" cy="90" rx="45" ry="10" fill="#000" opacity="0.1"/>

    <!-- 后面 -->
    <rect x="10" y="20" width="50" height="50" fill="#6C757D" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <rect x="18" y="28" width="16" height="16" fill="#F9C74F" opacity="0.8"/>

    <!-- 左面 -->
    <polygon points="10,20 35,5 60,20 35,35" fill="#3A86FF" stroke="#2b2b2b" stroke-width="2"/>
    <circle cx="35" cy="20" r="8" fill="#fff" opacity="0.4"/>

    <!-- 右面 -->
    <polygon points="60,20 85,35 85,70 60,55" fill="#264653" stroke="#2b2b2b" stroke-width="2"/>
    <rect x="68" y="30" width="10" height="10" fill="#fff" opacity="0.3" rx="1"/>

    <!-- 前面 -->
    <rect x="10" y="55" width="50" height="50" fill="#2A9D8F" stroke="#2b2b2b" stroke-width="2" rx="4"/>
    <circle cx="35" cy="80" r="12" fill="#fff" opacity="0.4"/>

    <!-- 高光效果 -->
    <ellipse cx="30" cy="70" rx="8" ry="4" fill="#fff" opacity="0.2"/>
  </g>

  <!-- 装饰元素 -->
  <circle cx="280" cy="40" r="6" fill="#e85d4c" opacity="0.2"/>
  <circle cx="30" cy="170" r="4" fill="#3A86FF" opacity="0.3"/>
  <circle cx="300" cy="160" r="5" fill="#2A9D8F" opacity="0.2"/>
  <circle cx="50" cy="30" r="3" fill="#E76F51" opacity="0.3"/>

  <!-- 底部彩色条 -->
  <rect x="40" y="175" width="30" height="4" rx="2" fill="#2A9D8F"/>
  <rect x="75" y="175" width="30" height="4" rx="2" fill="#264653"/>
  <rect x="110" y="175" width="30" height="4" rx="2" fill="#3A86FF"/>
  <rect x="145" y="175" width="30" height="4" rx="2" fill="#2B59C3"/>
  <rect x="180" y="175" width="30" height="4" rx="2" fill="#E76F51"/>
  <rect x="215" y="175" width="30" height="4" rx="2" fill="#6C757D"/>
  <rect x="250" y="175" width="30" height="4" rx="2" fill="#F9C74F"/>
</svg>
